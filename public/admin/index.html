<!doctype html>

        <a href="#dashboard" class="nav-link active"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a>
        <a href="#employees" class="nav-link"><i class="bi bi-people"></i><span>Employees</span></a>

        <a href="#notices" class="nav-link"><i class="bi bi-file-earmark-pdf"></i><span>Notices</span></a>

        <div class="modal-body" id="modalBody"></div>
